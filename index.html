<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tipos de Castanha dos Navios</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}.container{max-width:1200px;margin:0 auto;background:white;border-radius:15px;box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:30px}h1{text-align:center;color:#333;margin-bottom:10px}#subtitle{text-align:center;color:#666;margin-bottom:20px;font-size:0.9em}#adminBtn{display:block;margin:0 auto 20px;padding:12px 30px;background:#007bff;color:white;border:none;border-radius:8px;cursor:pointer}#adminBtn:hover{background:#0056b3}#search{width:100%;padding:15px;font-size:16px;border:2px solid #ddd;border-radius:8px;margin-bottom:20px}#search:focus{outline:none;border-color:#007bff}#adminNotice{display:none;background:#d4edda;color:#155724;padding:12px;border-radius:8px;margin-bottom:20px}table{width:100%;border-collapse:collapse}th{background:#f8f9fa;padding:15px;text-align:left;font-weight:600;border-bottom:2px solid #dee2e6}td{padding:15px;border-bottom:1px solid #e9ecef}tr:hover{background:#f8f9fa}.badge{display:inline-block;padding:6px 12px;border-radius:20px;font-weight:600;font-size:0.85em}.bol{background:#dc3545;color:white}.ci{background:#28a745;color:white}.undefined{background:#6c757d;color:white}#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center}.modal-content{background:white;padding:30px;border-radius:15px;max-width:400px;width:90%}.modal-content h2{margin-bottom:20px}.modal-content input{width:100%;padding:12px;margin-bottom:15px;border:2px solid #ddd;border-radius:8px}.modal-content button{width:100%;padding:12px;margin-top:5px;border:none;border-radius:8px;cursor:pointer}#loginBtn{background:#007bff;color:white}#cancelBtn{background:#6c757d;color:white}</style></head><body><div class="container"><h1>Tipos de Castanha dos Navios</h1><div id="subtitle">Consulta rápida - BOL (bolinha vermelha), C.I (castanha inteligente), UNDEFINED (desconhecido)</div><button id="adminBtn">🔒 Modo Admin</button><div id="adminNotice">✓ Admin ativo - você pode editar</div><input type="text" id="search" placeholder="Pesquisar navio..."><table><thead><tr><th>Navio</th><th>Tipo</th></tr></thead><tbody id="shipList"></tbody></table></div><div id="modal"><div class="modal-content"><h2>Senha Admin</h2><input type="password" id="password" placeholder="Digite a senha"><button id="loginBtn">Entrar</button><button id="cancelBtn">Cancelar</button></div></div><script>const ships=[{n:'CGM CORNELLE',t:'BOL'},{n:'CGM MAGDALENA',t:'C.I'},{n:'CGM MAUPASSANT',t:'BOL'},{n:'MERCOSUL ITAJAI',t:'BOL'},{n:'APL FLORIDA',t:'BOL'},{n:'APL OREGON',t:'BOL'},{n:'APL YANASHAN',t:'BOL'},{n:'AS CAROLINA',t:'BOL'},{n:'AS PAULINE',t:'C.I'},{n:'AGIOS DIMITRIOS',t:'BOL'},{n:'AISOPOS',t:'BOL'},{n:'AL SAFAT',t:'BOL'},{n:'ALDEBARAN/ATACAMA',t:'C.I'},{n:'ALESSIA',t:'BOL'},{n:'ALGOL',t:'BOL'},{n:'ALIANÇA CORRIENTES',t:'C.I'},{n:'ALIANÇA SAN MARTIN',t:'C.I'},{n:'ALIANÇA SANTA FE',t:'C.I'},{n:'ALIANÇA SANTOS',t:'BOL'},{n:'ALIANÇA LEBLON',t:'BOL'},{n:'ALIANÇA MANAUS',t:'C.I'},{n:'ALS VENUS',t:'BOL'},{n:'ALS VESTA',t:'BOL'},{n:'AMSTERDAM EXPRESS',t:'BOL'},{n:'AMERICO VESPUCIO',t:'C.I'},{n:'ANNIE B',t:'BOL'},{n:'ANTHEA V',t:'BOL'},{n:'ANTIBES EXPRESS',t:'BOL'},{n:'ANTOFAGASTA EXPRESS',t:'C.I'},{n:'APL DRAGOON',t:'BOL'},{n:'APL NEW JERSEY',t:'BOL'},{n:'APL YANGSHAN',t:'BOL'},{n:'ARICA EXPRESS',t:'C.I'},{n:'ARSOS',t:'BOL'},{n:'ARTEMIS',t:'BOL'},{n:'AS FILLIPA',t:'BOL'},{n:'AS CASPRIA',t:'BOL'},{n:'AS SABINE',t:'BOL'},{n:'AS SAMANTA',t:'BOL'},{n:'AS SILJE',t:'BOL'},{n:'BF HAMBURG',t:'BOL'},{n:'BARBARA',t:'BOL'},{n:'BARRY',t:'C.I'},{n:'BARTOLOMEU DIAS',t:'C.I'},{n:'BEA SCHUTI',t:'BOL'},{n:'BEME BEFFE',t:'BOL'},{n:'BLACKPOOL TOWER',t:'BOL'},{n:'BOSA',t:'C.I'},{n:'BREME BELLE',t:'BOL'},{n:'BREMEN',t:'BOL'},{n:'BRIGHT',t:'BOL'},{n:'BROOKLYN BRIDGE',t:'C.I'},{n:'C HAMBURG',t:'BOL'},{n:'COSCO KOREA',t:'BOL'},{n:'COSCO NEW YORK',t:'BOL'},{n:'COSCO SHANGHAI',t:'UNDEFINED'},{n:'CAP SAN ANTONIO',t:'C.I'},{n:'CAP SAN ARTEMISSIO',t:'C.I'},{n:'CAP SAN FELIPE',t:'C.I'},{n:'EVER STEADY',t:'UNDEFINED'},{n:'EVER UNIFIC',t:'BOL'},{n:'EVER FAST',t:'C.I'},{n:'EVER FAME',t:'C.I'},{n:'EVER FINE',t:'C.I'},{n:'EVER FIT',t:'C.I'},{n:'EVER FUTURE',t:'C.I'},{n:'EVER LADEN',t:'C.I'},{n:'EVER LIBERAL',t:'C.I'},{n:'LOG IN DISCOVERY',t:'BOL'},{n:'LOG IN ENDURANCE',t:'BOL'},{n:'LOG IN JACARANDA',t:'C.I'},{n:'LOG IN PANTANAL',t:'BOL'},{n:'LOG IN RESILIENTE',t:'BOL'},{n:'LONDON TRADER',t:'BOL'},{n:'MAERSK BERMUDA',t:'BOL'},{n:'MAERSK LA PAZ',t:'BOL'},{n:'MAERSK LEON',t:'BOL'},{n:'MAERSK LETICIA',t:'BOL'},{n:'MAERSK LONDRINA',t:'BOL'},{n:'MSC ADONIS',t:'C.I'},{n:'MSC AFRICA',t:'UNDEFINED'},{n:'MSC AGADIR',t:'BOL'},{n:'MSC ARICA',t:'BOL'},{n:'MSC ATHENS',t:'BOL'},{n:'MSC DUBAI',t:'BOL'},{n:'MSC GHANA',t:'BOL'},{n:'MSC GISELLE',t:'BOL'},{n:'MONTE ACONCAGUA',t:'C.I'},{n:'MONTE AZUL',t:'C.I'},{n:'MONTE CERVANTES',t:'C.I'},{n:'MONTE OLIVIA',t:'C.I'},{n:'MONTE ROSA',t:'C.I'},{n:'MONTE VERDE',t:'C.I'},{n:'XIN CHI WAN',t:'UNDEFINED'},{n:'XIN SU ZHOU',t:'BOL'},{n:'XIN WU HAN',t:'BOL'},{n:'YM CAPACITY',t:'C.I'},{n:'YM CENTENNIAL',t:'C.I'},{n:'YM CONTINENT',t:'C.I'},{n:'ZIM CHICAGO',t:'BOL'},{n:'ZIM LOS ANGELES',t:'BOL'},{n:'ZIM SAN DIEGO',t:'BOL'},{n:'ZIM THAILAND',t:'C.I'},{n:'IRENES RESOLVE',t:'C.I'},{n:'IRENES RULE',t:'C.I'},{n:'IRENES WISDOM',t:'C.I'},{n:'SEASPAN RAPTOR',t:'C.I'},{n:'SEAMAX ROWAYTON',t:'C.I'},{n:'SALVADOR EXPRESS',t:'C.I'},{n:'SANTOS EXPRESS',t:'BOL'},{n:'SEAMAX EMPIRE',t:'BOL'},{n:'SEASPAN FUZHOU',t:'BOL'},{n:'SEASPAN HAMBURG',t:'BOL'},{n:'SEASPAN HANOVER',t:'BOL'},{n:'SEASPAN OSPREY',t:'C.I'},{n:'SEASPAN SANTOS',t:'BOL'},{n:'SEBASTIAO CABOTO',t:'C.I'},{n:'SKYROS',t:'BOL'},{n:'SUAPE EXPRESS',t:'BOL'},{n:'SWANSEA',t:'BOL'},{n:'TAIPEI TRADE',t:'BOL'},{n:'TASMAN',t:'BOL'}];let adminActive=false;const list=document.getElementById('shipList');const search=document.getElementById('search');const modal=document.getElementById('modal');const adminBtn=document.getElementById('adminBtn');const adminNotice=document.getElementById('adminNotice');function render(filter=''){list.innerHTML='';ships.filter(s=>s.n.toLowerCase().includes(filter.toLowerCase())).forEach(s=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${s.n}</td><td><span class="badge ${s.t.toLowerCase().replace('.','')}">${s.t}</span></td>`;list.appendChild(tr)})}adminBtn.onclick=()=>modal.style.display='flex';document.getElementById('cancelBtn').onclick=()=>modal.style.display='none';document.getElementById('loginBtn').onclick=()=>{if(document.getElementById('password').value==='1234'){adminActive=true;modal.style.display='none';adminNotice.style.display='block';adminBtn.style.display='none'}else{alert('Senha incorreta')}};search.oninput=e=>render(e.target.value);render();</script></body></html>
