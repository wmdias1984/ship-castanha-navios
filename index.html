<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 CastanhaCheck - Tipos de Castanha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 30px; }
        h1 { text-align: center; color: #333; margin-bottom: 5px; }
        #subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 0.9em; }
        .stats { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-badge { padding: 8px 15px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; transition: transform 0.2s; border: none; }
        .stat-badge:hover { transform: scale(1.05); }
        .stat-badge span { margin-left: 5px; opacity: 0.9; font-size: 0.8em; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        #search { flex: 1; padding: 15px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; outline: none; transition: border 0.3s; }
        #search:focus { border-color: #667eea; }
        #adminBtn, #addShipBtn, #suggestBtn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.3s; font-weight: bold; }
        #adminBtn { background: #007bff; color: white; }
        #addShipBtn { background: #28a745; color: white; display: none; }
        #suggestBtn { background: #ffc107; color: #333; }
        #adminNotice { display: none; background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #28a745; font-weight: bold; text-align: center; position: relative; }
        .ships-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .ship-card { background: #f8f9fa; padding: 15px; border-radius: 10px; border-left: 5px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; border: 1px solid #eee; }
        .ship-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-color: #667eea; }
        .ship-info strong { display: block; color: #333; font-size: 1.1em; margin-bottom: 5px; }
        .badge { padding: 4px 10px; border-radius: 5px; font-size: 0.7em; font-weight: 800; color: white; text-transform: uppercase; }
        .bol { background: #dc3545; }
        .ci { background: #28a745; }
        .undefined { background: #6c757d; }
        .card-actions { display: none; gap: 8px; }
        .admin-active .card-actions { display: flex; }
        .action-btn { background: white; border: 1px solid #ddd; cursor: pointer; padding: 8px; border-radius: 8px; font-size: 1em; transition: all 0.2s; }
        .action-btn:hover { background: #f1f3f5; transform: scale(1.1); }
        .delete-btn:hover { color: #dc3545; border-color: #dc3545; }
        .report-btn { font-size: 0.8em; color: #666; cursor: pointer; text-decoration: underline; margin-top: 5px; display: inline-block; }
        #modal, #editModal, #suggestModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 95%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .modal-content h2 { margin-bottom: 20px; color: #333; text-align: center; }
        .modal-content label { display: block; margin-bottom: 5px; font-size: 0.8em; color: #666; font-weight: bold; }
        .modal-content input, .modal-content select, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; }
        .modal-content button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 8px; transition: background 0.3s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        @media (max-width: 600px) { .container { padding: 15px; } .ships-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 CastanhaCheck</h1>
        <p id="subtitle">Consulta de Castanhas: BOL, C.I, UNDEFINED</p>
        <div id="adminNotice">MODO ADMIN ATIVO</div>
        <div class="stats">
            <button class="stat-badge bol" onclick="filterByType('BOL')">BOL <span id="countBOL">0</span></button>
            <button class="stat-badge ci" onclick="filterByType('C.I')">C.I <span id="countCI">0</span></button>
            <button class="stat-badge undefined" onclick="filterByType('UNDEFINED')">UND <span id="countUND">0</span></button>
            <button class="stat-badge" style="background:#333" onclick="filterByType('')">TODOS <span id="countTotal">0</span></button>
        </div>
        <div class="controls">
            <input type="text" id="search" placeholder="Pesquisar por nome do navio..." autocomplete="off">
            <button id="addShipBtn" onclick="openAdd()">+ Novo Navio</button>
            <button id="suggestBtn" onclick="openSuggest()">💡 Sugerir</button>
            <button id="adminBtn">🔒 Modo Admin</button>
        </div>
        <div id="results" class="ships-grid"></div>
    </div>
    <div id="modal">
        <div class="modal-content">
            <h2>Senha Admin</h2>
            <input type="password" id="pass" placeholder="Digite a senha">
            <button class="btn-primary" onclick="login()">Entrar</button>
            <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
    <div id="editModal">
        <div class="modal-content">
            <h2 id="modalTitle">Editar Navio</h2>
            <label>Nome do Navio</label>
            <input type="text" id="editNameInput" placeholder="Ex: CMA CGM CORNEILLE">
            <label>Tipo de Castanha</label>
            <select id="editType">
                <option value="BOL">BOL (Bolinha)</option>
                <option value="C.I">C.I (Inteligente)</option>
                <option value="UNDEFINED">UNDEFINED (Desconhecido)</option>
            </select>
            <button class="btn-primary" onclick="saveEdit()">Salvar</button>
            <button class="btn-secondary" onclick="closeEdit()">Cancelar</button>
        </div>
    </div>
    <div id="suggestModal">
        <div class="modal-content">
            <h2>Sugerir Melhoria</h2>
            <p style="font-size: 0.8em; color: #666; margin-bottom: 15px;">Seus dados serão enviados por e-mail para o administrador.</p>
            <label>Navio</label>
            <input type="text" id="suggestName" placeholder="Nome do navio">
            <label>Sugestão</label>
            <textarea id="suggestDetail" rows="3" placeholder="Ex: Mudar de BOL para CI ou adicionar novo navio"></textarea>
            <button class="btn-primary" onclick="sendSuggestion()">Enviar Sugestão</button>
            <button class="btn-secondary" onclick="closeSuggest()">Cancelar</button>
        </div>
    </div>

        let ships = [];
        function init() {
            const saved = localStorage.getItem('ships_data_v2');
            if(saved) {
                ships = JSON.parse(saved);
                let migrated = false;
                ships.forEach(s => {
                    if(s.name.startsWith('CGM ')) { s.name = 'CMA CGM ' + s.name.substring(4); migrated = true; }
                    if(s.name.toLowerCase() === 'cma cgm paraty' || s.name.toLowerCase() === 'cgm paraty') { s.name = 'CMA CGM PARATY'; migrated = true; }
                    if(s.name === 'APL Yanashan') { s.name = 'APL YANGSHAN'; migrated = true; }
                });
                if(migrated) {
                    const unique = new Map();
                    ships.forEach(s => { unique.set(s.name.toUpperCase().trim(), s.type); });
                    ships = Array.from(unique, ([name, type]) => ({ name, type }));
                    ships.sort((a, b) => a.name.localeCompare(b.name));
                    localStorage.setItem('ships_data_v2', JSON.stringify(ships));
                }
            } else {
                const unique = new Map();
                initialShipsRaw.forEach(s => { unique.set(s.name.toUpperCase().trim(), s.type); });
                ships = Array.from(unique, ([name, type]) => ({ name, type }));
                ships.sort((a, b) => a.name.localeCompare(b.name));
                localStorage.setItem('ships_data_v2', JSON.stringify(ships));
            }
            render();
        }
        function render() {
            const res = document.getElementById('results');
            const searchVal = document.getElementById('search').value.toLowerCase().trim();
            const filtered = ships.filter(s => {
                const matchesName = s.name.toLowerCase().includes(searchVal);
                const matchesFilter = currentFilter === '' || s.type === currentFilter;
                return matchesName && matchesFilter;
            });
            res.innerHTML = '';
            filtered.forEach((s, idx) => {
                const originalIdx = ships.findIndex(ship => ship.name === s.name);
                const card = document.createElement('div');
                card.className = 'ship-card';
                card.innerHTML = `
                    <div class="ship-info">
                        <strong>${s.name}</strong>
                        <span class="badge ${s.type.toLowerCase().replace('.','')}">${s.type}</span>
                        ${!isAdmin ? `<span class="report-btn" onclick="openSuggestFor('${s.name}')">Reportar erro</span>` : ''}
                    </div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="openEdit(${originalIdx})">✏️</button>
                        <button class="action-btn delete-btn" onclick="deleteShip(${originalIdx})">🗑️</button>
                    </div>
                `;
                res.appendChild(card);
            });
            updateStats();
        }
        function updateStats() {
            const counts = { 'BOL': 0, 'C.I': 0, 'UNDEFINED': 0 };
            ships.forEach(s => counts[s.type]++);
            document.getElementById('countBOL').innerText = counts['BOL'];
            document.getElementById('countCI').innerText = counts['C.I'];
            document.getElementById('countUND').innerText = counts['UNDEFINED'];
            document.getElementById('countTotal').innerText = ships.length;
        }
        function filterByType(type) { currentFilter = type; render(); }
        document.getElementById('search').oninput = render;
        document.getElementById('adminBtn').onclick = () => {
            if(isAdmin) {
                isAdmin = false;
                document.body.classList.remove('admin-active');
                document.getElementById('adminNotice').style.display = 'none';
                document.getElementById('addShipBtn').style.display = 'none';
                document.getElementById('adminBtn').innerText = '🔒 Modo Admin';
                render();
            } else {
                document.getElementById('modal').style.display = 'flex';
                document.getElementById('pass').focus();
            }
        };
        function login() {
            if(document.getElementById('pass').value === '1234') {
                isAdmin = true;
                document.body.classList.add('admin-active');
                document.getElementById('adminNotice').style.display = 'block';
                document.getElementById('addShipBtn').style.display = 'inline-block';
                document.getElementById('adminBtn').innerText = '🔓 Sair Admin';
                closeModal();
                render();
            } else { alert('Senha incorreta!'); }
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('pass').value = ''; }
        let editIdx = -1;
        function openAdd() {
            editIdx = -1;
            document.getElementById('modalTitle').innerText = 'Adicionar Novo Navio';
            document.getElementById('editNameInput').value = '';
            document.getElementById('editType').value = 'BOL';
            document.getElementById('editModal').style.display = 'flex';
        }
        function openEdit(idx) {
            editIdx = idx;
            document.getElementById('modalTitle').innerText = 'Editar Navio';
            document.getElementById('editNameInput').value = ships[idx].name;
            document.getElementById('editType').value = ships[idx].type;
            document.getElementById('editModal').style.display = 'flex';
        }
        function saveEdit() {
            const name = document.getElementById('editNameInput').value.toUpperCase().trim();
            const type = document.getElementById('editType').value;
            if(!name) return alert('O nome do navio é obrigatório!');
            if(editIdx === -1) {
                if(ships.some(s => s.name === name)) return alert('Este navio já existe!');
                ships.push({ name, type });
            } else { ships[editIdx] = { name, type }; }
            ships.sort((a, b) => a.name.localeCompare(b.name));
            localStorage.setItem('ships_data_v2', JSON.stringify(ships));
            closeEdit();
            render();
        }
        function deleteShip(idx) {
            if(confirm('Deseja realmente excluir este navio?')) {
                ships.splice(idx, 1);
                localStorage.setItem('ships_data_v2', JSON.stringify(ships));
                render();
            }
        }
        function closeEdit() { document.getElementById('editModal').style.display = 'none'; }
        function openSuggest() {
            document.getElementById('suggestName').value = '';
            document.getElementById('suggestDetail').value = '';
            document.getElementById('suggestModal').style.display = 'flex';
        }
        function openSuggestFor(shipName) {
            document.getElementById('suggestName').value = shipName;
            document.getElementById('suggestDetail').value = 'O tipo de castanha está incorreto. O correto é...';
            document.getElementById('suggestModal').style.display = 'flex';
        }
        function closeSuggest() { document.getElementById('suggestModal').style.display = 'none'; }
        function sendSuggestion() {
            const name = document.getElementById('suggestName').value;
            const detail = document.getElementById('suggestDetail').value;
            if(!name || !detail) return alert('Por favor, preencha o nome do navio e o detalhe da sugestão.');
            const subject = encodeURIComponent('Sugestão de Atualização - 🎨 CastanhaCheck');
            const body = encodeURIComponent(`Olá Admin,\n\nSugestão para o navio: ${name}\nDetalhes: ${detail}\n\nEnviado via App Ship List.`);
            window.location.href = `mailto:wmdias1984@gmail.com?subject=${subject}&body=${body}`;
            closeSuggest();
        }
