<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de Castanha dos Navios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 30px; }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        #subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 0.9em; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        #search { flex: 1; padding: 15px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; outline: none; transition: border 0.3s; }
        #search:focus { border-color: #667eea; }
        #adminBtn { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.3s; }
        #adminBtn:hover { opacity: 0.8; }
        #adminNotice { display: none; background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #28a745; font-weight: bold; }
        .ships-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .ship-card { background: #f8f9fa; padding: 15px; border-radius: 10px; border-left: 4px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; transition: transform 0.2s; }
        .ship-card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.75em; font-weight: bold; color: white; text-transform: uppercase; }
        .bol { background: #dc3545; }
        .ci { background: #28a745; }
        .undefined { background: #6c757d; }
        #modal, #editModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 95%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .modal-content h2 { margin-bottom: 20px; color: #333; text-align: center; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; }
        .modal-content button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 8px; transition: background 0.3s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .edit-btn { background: none; border: none; cursor: pointer; font-size: 1.2em; display: none; padding: 5px; border-radius: 5px; }
        .edit-btn:hover { background: #e9ecef; }
        .admin-active .edit-btn { display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tipos de Castanha dos Navios</h1>
        <p id="subtitle">Consulta rápida: BOL (bolinha vermelha), C.I (inteligente), UNDEFINED (desconhecido)</p>
        <div id="adminNotice">MODO ADMIN ATIVO</div>
        <div class="controls">
            <input type="text" id="search" placeholder="Pesquisar navio por nome..." autocomplete="off">
            <button id="adminBtn">🔒 Modo Admin</button>
        </div>
        <div id="results" class="ships-grid"></div>
    </div>

    <!-- Login Modal -->
    <div id="modal">
        <div class="modal-content">
            <h2>Senha Admin</h2>
            <input type="password" id="pass" placeholder="Digite a senha">
            <button class="btn-primary" onclick="login()">Entrar</button>
            <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

        function render(list) {
            const res = document.getElementById('results');
            res.innerHTML = '';
            list.forEach((s, idx) => {
                const card = document.createElement('div');
                card.className = 'ship-card';
                card.innerHTML = `
                    <div>
                        <strong>${s.name}</strong>
                        <span class="badge ${s.type.toLowerCase().replace('.','')}">${s.type}</span>
                    </div>
                    <button class="edit-btn" onclick="openEdit(${idx})">✏️</button>
                `;
                res.appendChild(card);
            });
        }

        document.getElementById('search').oninput = (e) => {
            const t = e.target.value.toLowerCase().trim();
            const filtered = ships.filter(s => s.name.toLowerCase().includes(t));
            render(filtered);
        };

        document.getElementById('adminBtn').onclick = () => {
            if(isAdmin) {
                isAdmin = false;
                document.body.classList.remove('admin-active');
                document.getElementById('adminNotice').style.display = 'none';
                document.getElementById('adminBtn').innerText = '🔒 Modo Admin';
            } else {
                document.getElementById('modal').style.display = 'flex';
            }
        };

        function login() {
            if(document.getElementById('pass').value === '1234') {
                isAdmin = true;
                document.body.classList.add('admin-active');
                document.getElementById('adminNotice').style.display = 'block';
                document.getElementById('adminBtn').innerText = '🔓 Sair Admin';
                closeModal();
            } else {
                alert('Senha incorreta!');
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('pass').value = '';
        }

        let editIdx = -1;
        function openEdit(idx) {
            editIdx = idx;
            document.getElementById('editName').innerText = ships[idx].name;
            document.getElementById('editType').value = ships[idx].type;
            document.getElementById('editModal').style.display = 'flex';
        }

        function saveEdit() {
            ships[editIdx].type = document.getElementById('editType').value;
            localStorage.setItem('ships_data', JSON.stringify(ships));
            closeEdit();
            render(ships);
        }

        function closeEdit() {
            document.getElementById('editModal').style.display = 'none';
        }

        function init() {
            const saved = localStorage.getItem('ships_data');
            if(saved) ships = JSON.parse(saved);
            render(ships);
        }

        init();
    </script>
