<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tipos de Castanha dos Navios</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Roboto,sans-serif;background:#f8f9fa;color:#333;padding:20px;max-width:1000px;margin:0 auto}h1{text-align:center;margin-bottom:10px;font-size:28px}p{text-align:center;color:#666;margin-bottom:15px}input{width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:5px;font-size:14px}button{padding:8px 15px;margin:5px;background:#007bff;color:white;border:none;border-radius:5px;cursor:pointer;font-size:13px}.admin{display:none!important}.badge{padding:3px 8px;border-radius:12px;font-size:12px;font-weight:bold;color:white}.bol{background:#ff4444}.ci{background:#28a745}.undef{background:#6c757d}table{width:100%;border-collapse:collapse;margin-top:20px;background:white;border-radius:5px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}th,td{padding:12px;text-align:left;border-bottom:1px solid #eee}th{background:#f1f3f5;font-weight:600;border-bottom:2px solid #dee2e6}tr:hover{background:#f9f9f9}.no-results{text-align:center;color:#999;margin-top:20px;padding:20px}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:1000}.modal.show{display:flex}.modal-content{background:white;padding:20px;border-radius:8px;width:90%;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,.2)}.modal-content h3{margin-bottom:15px;font-size:18px}.modal-content input,.modal-content select{width:100%;padding:8px;margin-bottom:10px;border:1px solid #ddd;border-radius:5px;font-size:14px}.modal-content button{width:100%;margin-top:5px}.admin-bar{margin-bottom:15px;text-align:center}.admin-badge{background:#d4edda;color:#155724;padding:10px;border-radius:5px;border:1px solid #c3e6cb;display:none;margin-bottom:10px}</style></head><body><h1>Tipos de Castanha do onst e=document.getElementById('editName').value.trim().toUpperCase();e?(ships[editIdx].name=e,ships[editIdx].type=document.getElementById('editType').value,closeEditModal(),render(),alert('Navio atualizado!')):alert('Digite um nome válido')}render()</script></body></html>
